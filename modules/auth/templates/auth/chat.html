{% extends "base.html" %}
{% block title %}消息 - OA系统{% endblock %}
{% block extra_css %}
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<style>
.chat-page{display:flex;height:calc(100vh - 64px);max-width:1200px;margin:0 auto;padding:0;overflow:hidden}
.chat-sidebar{width:280px;min-width:280px;background:rgba(255,255,255,.75);backdrop-filter:blur(12px);border-right:1px solid #e5e7eb;display:flex;flex-direction:column}
.sidebar-header{padding:16px;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;justify-content:space-between}
.sidebar-header h2{margin:0;font-size:1rem;color:#111827;display:flex;align-items:center;gap:6px}
.sidebar-header h2 .material-icons{color:#0ea5e9;font-size:1.2rem}
.new-chat-btn{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border:none;border-radius:8px;background:linear-gradient(135deg,#0ea5e9,#06b6d4);color:#fff;font-size:.78rem;font-weight:700;cursor:pointer}
.new-chat-btn:hover{opacity:.9}
.conversation-list{flex:1;overflow-y:auto;padding:8px}
.conv-item{display:flex;align-items:center;gap:10px;padding:12px;border-radius:12px;cursor:pointer;transition:background .15s}
.conv-item:hover,.conv-item.active{background:#f0f9ff}
.conv-item.active{border:1px solid #bae6fd}
.conv-avatar{width:40px;height:40px;border-radius:50%;background:#e0f2fe;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.conv-avatar .material-icons{color:#0ea5e9;font-size:1.2rem}
.conv-info{flex:1;min-width:0}
.conv-name{font-size:.88rem;font-weight:700;color:#111827;display:flex;align-items:center;gap:6px}
.conv-role{font-size:.65rem;padding:1px 6px;border-radius:999px;font-weight:600}
.conv-role.teacher{background:#f3e8ff;color:#7c3aed}
.conv-role.student{background:#dcfce7;color:#166534}
.conv-role.admin{background:#e0f2fe;color:#0369a1}
.conv-preview{font-size:.78rem;color:#9ca3af;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.conv-unread{background:#ef4444;color:#fff;font-size:.7rem;font-weight:700;padding:2px 7px;border-radius:999px;flex-shrink:0}
.chat-main{flex:1;display:flex;flex-direction:column;background:#fafbfc}
.chat-header{padding:16px 20px;border-bottom:1px solid #e5e7eb;background:rgba(255,255,255,.75);backdrop-filter:blur(12px)}
.chat-header h3{margin:0;font-size:1rem;color:#111827}
.chat-header .partner-role{font-size:.78rem;color:#6b7280;margin-top:2px}
.message-list{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:8px}
.msg-row{display:flex}
.msg-row.sent{justify-content:flex-end}
.msg-row.received{justify-content:flex-start}
.msg-bubble{max-width:65%;padding:10px 14px;border-radius:16px;font-size:.9rem;line-height:1.5;word-break:break-word}
.msg-row.sent .msg-bubble{background:linear-gradient(135deg,#0ea5e9,#06b6d4);color:#fff;border-bottom-right-radius:4px}
.msg-row.received .msg-bubble{background:#fff;color:#111827;border:1px solid #e5e7eb;border-bottom-left-radius:4px}
.msg-time{font-size:.68rem;color:#9ca3af;margin-top:4px}
.msg-row.sent .msg-time{text-align:right}
.chat-input-bar{padding:14px 20px;border-top:1px solid #e5e7eb;background:rgba(255,255,255,.85);backdrop-filter:blur(12px);display:flex;gap:10px;align-items:center}
.chat-input-bar input{flex:1;padding:10px 14px;border:1px solid #d1d5db;border-radius:12px;font-size:.9rem;outline:none}
.chat-input-bar input:focus{border-color:#0ea5e9;box-shadow:0 0 0 3px rgba(14,165,233,.12)}
.send-btn{padding:10px 18px;border:none;border-radius:12px;background:linear-gradient(135deg,#0ea5e9,#06b6d4);color:#fff;font-size:.88rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px}
.send-btn:hover{opacity:.9}
.send-btn:disabled{opacity:.5;cursor:not-allowed}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#9ca3af;font-size:.9rem;gap:8px}
.empty-state .material-icons{font-size:3rem;opacity:.3}
.no-chat-selected{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#9ca3af;gap:8px}
.no-chat-selected .material-icons{font-size:3rem;opacity:.3}
/* New chat modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal-box{background:#fff;border-radius:16px;padding:24px;width:360px;max-height:70vh;overflow-y:auto;box-shadow:0 20px 40px rgba(0,0,0,.15)}
.modal-box h3{margin:0 0 16px;font-size:1.05rem;color:#111827}
.modal-user-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;transition:background .15s}
.modal-user-item:hover{background:#f0f9ff}
.modal-user-item .name{font-size:.9rem;font-weight:600;color:#111827}
.modal-close{margin-top:14px;width:100%;padding:10px;border:1px solid #d1d5db;border-radius:10px;background:#fff;color:#374151;font-size:.88rem;cursor:pointer}
.modal-close:hover{background:#f8fafc}
@media(max-width:768px){
  .chat-sidebar{width:100%;min-width:auto;position:absolute;z-index:10;height:100%}
  .chat-sidebar.hidden{display:none}
  .chat-main{width:100%}
  .back-btn{display:inline-flex!important}
}
.back-btn{display:none;align-items:center;gap:4px;background:none;border:none;color:#0ea5e9;cursor:pointer;font-size:.85rem;padding:0;margin-right:8px}
</style>
{% endblock %}
{% block content %}
<div class="chat-page">
  <!-- Left sidebar: conversations -->
  <div class="chat-sidebar" id="chatSidebar">
    <div class="sidebar-header">
      <h2><span class="material-icons">chat</span> 消息</h2>
      <button class="new-chat-btn" id="newChatBtn" onclick="openNewChat()">
        <span class="material-icons" style="font-size:.95rem">add</span> 新建对话
      </button>
    </div>
    <div class="conversation-list" id="convList">
      <div class="empty-state">
        <span class="material-icons">forum</span>
        <span>暂无对话</span>
      </div>
    </div>
  </div>

  <!-- Right main area -->
  <div class="chat-main" id="chatMain">
    <div class="no-chat-selected" id="noChatSelected">
      <span class="material-icons">question_answer</span>
      <span>选择一个对话开始聊天</span>
    </div>
    <div id="chatArea" style="display:none;flex-direction:column;flex:1;height:100%">
      <div class="chat-header" id="chatHeader">
        <h3>
          <button class="back-btn" onclick="goBackToList()"><span class="material-icons" style="font-size:1.1rem">arrow_back</span></button>
          <span id="partnerName"></span>
        </h3>
        <div class="partner-role" id="partnerRole"></div>
      </div>
      <div class="message-list" id="messageList"></div>
      <div class="chat-input-bar">
        <input type="text" id="msgInput" placeholder="输入消息..." onkeydown="if(event.key==='Enter')sendMessage()">
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <span class="material-icons" style="font-size:1rem">send</span> 发送
        </button>
      </div>
    </div>
  </div>
</div>

<!-- New chat modal -->
<div class="modal-overlay" id="newChatModal">
  <div class="modal-box">
    <h3>选择联系人</h3>
    <div id="contactList">
      <div class="empty-state" style="padding:20px"><span>加载中...</span></div>
    </div>
    <button class="modal-close" onclick="closeNewChat()">取消</button>
  </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
const CURRENT_USER_ID = {{ current_user.id }};
const CURRENT_ROLE = '{{ current_user.role }}';
let activePartnerId = null;
let pollTimer = null;

document.addEventListener('DOMContentLoaded', function(){
  loadConversations();
});

function getRoleMeta(role){
  if(role === 'teacher') return {cls: 'teacher', label: '老师'};
  if(role === 'student') return {cls: 'student', label: '学生'};
  return {cls: 'admin', label: '管理员'};
}

async function loadConversations(){
  try{
    const res = await fetch('/auth/api/chat/conversations');
    const json = await res.json();
    if(!json.success) return;
    const list = document.getElementById('convList');
    if(!json.data || json.data.length === 0){
      list.innerHTML = '<div class="empty-state"><span class="material-icons">forum</span><span>暂无对话</span></div>';
      return;
    }
    list.innerHTML = json.data.map(c => {
      const roleMeta = getRoleMeta(c.role);
      const unreadCount = Number(c.unread_count || c.unread || 0);
      const unread = unreadCount > 0 ? `<span class="conv-unread">${unreadCount}</span>` : '';
      return `
        <div
          class="conv-item ${c.user_id === activePartnerId ? 'active' : ''}"
          data-user-id="${c.user_id}"
          data-name="${escAttr(c.display_name)}"
          data-role="${escAttr(c.role)}"
          onclick="openChatFromElement(this)"
        >
          <div class="conv-avatar"><span class="material-icons">person</span></div>
          <div class="conv-info">
            <div class="conv-name">${escHtml(c.display_name)} <span class="conv-role ${roleMeta.cls}">${roleMeta.label}</span></div>
            <div class="conv-preview">${escHtml(c.last_message || '')}</div>
          </div>
          ${unread}
        </div>
      `;
    }).join('');
  }catch(e){console.error(e);}
}

function openChatFromElement(element){
  const {userId, name, role} = element.dataset;
  return openChat(Number(userId), name, role, element);
}

async function openChat(userId, name, role, activeElement=null){
  activePartnerId = userId;
  document.getElementById('noChatSelected').style.display = 'none';
  const area = document.getElementById('chatArea');
  area.style.display = 'flex';
  document.getElementById('partnerName').textContent = name;
  document.getElementById('partnerRole').textContent = getRoleMeta(role).label;

  // On mobile, hide sidebar
  document.getElementById('chatSidebar').classList.add('hidden');

  // Highlight active
  document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
  if(activeElement){
    activeElement.classList.add('active');
  }

  await loadMessages();
  startPolling();
}

async function loadMessages(){
  if(!activePartnerId) return;
  try{
    const res = await fetch(`/auth/api/chat/messages?with=${activePartnerId}`);
    const json = await res.json();
    if(!json.success) return;
    const ml = document.getElementById('messageList');
    if(!json.data || json.data.length === 0){
      ml.innerHTML = '<div class="empty-state"><span class="material-icons">chat_bubble_outline</span><span>暂无消息，开始聊天吧</span></div>';
      return;
    }
    ml.innerHTML = json.data.map(m => {
      const isSent = m.sender_id === CURRENT_USER_ID;
      const time = m.created_at ? new Date(m.created_at).toLocaleString('zh-CN', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
      return `
        <div class="msg-row ${isSent ? 'sent' : 'received'}">
          <div>
            <div class="msg-bubble">${escHtml(m.content)}</div>
            <div class="msg-time">${time}</div>
          </div>
        </div>
      `;
    }).join('');
    ml.scrollTop = ml.scrollHeight;
    // Refresh conversation list to update unread counts
    loadConversations();
  }catch(e){console.error(e);}
}

async function sendMessage(){
  if(!activePartnerId) return;
  const input = document.getElementById('msgInput');
  const content = input.value.trim();
  if(!content) return;
  input.value = '';
  document.getElementById('sendBtn').disabled = true;
  try{
    const res = await fetch('/auth/api/chat/send', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({receiver_id: activePartnerId, content: content})
    });
    const json = await res.json();
    if(json.success){
      await loadMessages();
    }
  }catch(e){console.error(e);}
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('msgInput').focus();
}

function startPolling(){
  if(pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(()=>{
    loadMessages();
  }, 5000);
}

function goBackToList(){
  document.getElementById('chatSidebar').classList.remove('hidden');
  document.getElementById('chatArea').style.display = 'none';
  document.getElementById('noChatSelected').style.display = '';
  activePartnerId = null;
  if(pollTimer) clearInterval(pollTimer);
}

async function openNewChat(){
  document.getElementById('newChatModal').classList.add('show');
  const cl = document.getElementById('contactList');
  cl.innerHTML = '<div class="empty-state" style="padding:20px"><span>加载中...</span></div>';
  try{
    let contacts = [];
    if(CURRENT_ROLE === 'teacher'){
      const res = await fetch('/auth/api/teacher/my-schedule?range=all');
      const json = await res.json();
      if(json.success && json.data.students){
        const seen = new Set();
        json.data.students.forEach(s => {
          if(s.user_id && !seen.has(s.user_id)){
            seen.add(s.user_id);
            contacts.push({id: s.user_id, name: s.name, role: 'student'});
          }
        });
      }
    } else if(CURRENT_ROLE === 'student'){
      const res = await fetch('/auth/api/student/my-info');
      const json = await res.json();
      if(json.success && json.data.enrollments){
        const seen = new Set();
        json.data.enrollments.forEach(e => {
          if(e.teacher_id && !seen.has(e.teacher_id)){
            seen.add(e.teacher_id);
            contacts.push({id: e.teacher_id, name: e.teacher_name, role: 'teacher'});
          }
        });
      }
    } else if(CURRENT_ROLE === 'admin'){
      const res = await fetch('/auth/api/users');
      const json = await res.json();
      if(json.success && json.data){
        contacts = json.data
          .filter(user => user.id !== CURRENT_USER_ID && user.is_active)
          .map(user => ({id: user.id, name: user.display_name, role: user.role}));
      }
    }
    if(contacts.length === 0){
      cl.innerHTML = '<div class="empty-state" style="padding:20px"><span>暂无可联系的人</span></div>';
      return;
    }
    cl.innerHTML = contacts.map(c => {
      const roleMeta = getRoleMeta(c.role);
      return `
        <div
          class="modal-user-item"
          data-user-id="${c.id}"
          data-name="${escAttr(c.name)}"
          data-role="${escAttr(c.role)}"
          onclick="startChatWith(this)"
        >
          <div class="conv-avatar"><span class="material-icons">person</span></div>
          <div class="name">${escHtml(c.name)} <span class="conv-role ${roleMeta.cls}">${roleMeta.label}</span></div>
        </div>
      `;
    }).join('');
  }catch(e){
    cl.innerHTML = '<div class="empty-state" style="padding:20px"><span>加载失败</span></div>';
    console.error(e);
  }
}

function closeNewChat(){
  document.getElementById('newChatModal').classList.remove('show');
}

function startChatWith(element){
  const {userId, name, role} = element.dataset;
  closeNewChat();
  openChat(Number(userId), name, role);
}

function escHtml(str){
  if(!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escAttr(str){
  if(!str) return '';
  return escHtml(str).replace(/'/g, '&#39;');
}
</script>
{% endblock %}
