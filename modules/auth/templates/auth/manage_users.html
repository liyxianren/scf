{% extends "auth/_shell.html" %}
{% block title %}用户管理 - OA系统{% endblock %}
{% block extra_css %}
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<style>
.oa-page{max-width:1080px;margin:0 auto;padding:28px 20px 40px}
.back-link{display:inline-flex;align-items:center;gap:4px;color:#6b7280;text-decoration:none;font-size:.88rem;margin-bottom:14px}
.back-link:hover{color:#0ea5e9}
.page-header{display:flex;justify-content:space-between;align-items:flex-start;gap:18px;margin-bottom:24px;flex-wrap:wrap}
.page-header h1{margin:0;display:flex;align-items:center;gap:10px;font-size:1.8rem;color:#111827}
.page-header h1 .material-icons{color:#0ea5e9}
.header-actions{display:flex;gap:10px;flex-wrap:wrap}
.btn-primary{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border:none;border-radius:10px;background:linear-gradient(135deg,#0ea5e9,#06b6d4);color:#fff;font-size:.92rem;font-weight:700;cursor:pointer;box-shadow:0 8px 20px rgba(14,165,233,.18)}
.btn-primary:hover{opacity:.92}
.btn-secondary{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border:1px solid #d1d5db;border-radius:10px;background:#fff;color:#374151;font-size:.92rem;font-weight:700;cursor:pointer}
.btn-secondary:hover{background:#f3f4f6}
.users-table-wrap{overflow-x:auto}
.users-table{width:100%;border-collapse:separate;border-spacing:0;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 10px 24px rgba(15,23,42,.04);border:1px solid #e5e7eb}
.users-table th{padding:14px 16px;text-align:left;font-size:.82rem;font-weight:800;color:#6b7280;text-transform:uppercase;background:#f8fafc;border-bottom:1px solid #e5e7eb}
.users-table td{padding:14px 16px;font-size:.92rem;color:#374151;border-bottom:1px solid #f1f5f9}
.users-table tr:last-child td{border-bottom:none}
.users-table tr:hover td{background:#f8fafc}
.role-badge{display:inline-block;padding:4px 10px;border-radius:999px;font-size:.78rem;font-weight:700}
.role-admin{background:#fee2e2;color:#991b1b}
.role-teacher{background:#dbeafe;color:#1d4ed8}
.role-student{background:#dcfce7;color:#166534}
.status-active{color:#16a34a;font-weight:700}
.status-inactive{color:#dc2626;font-weight:700}
.action-btn{padding:6px 10px;border:none;border-radius:8px;font-size:.82rem;font-weight:700;cursor:pointer;margin-right:6px}
.action-stack{display:flex;flex-wrap:wrap;gap:6px}
.action-stack .action-btn{margin-right:0}
.edit-btn{background:#eff6ff;color:#1d4ed8}
.edit-btn:hover{background:#dbeafe}
.toggle-btn{background:#f0fdf4;color:#16a34a}
.toggle-btn.deactivate{background:#fef2f2;color:#dc2626}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:1000;justify-content:center;align-items:center;padding:20px}
.modal-overlay.active{display:flex}
.modal-content{width:520px;max-width:100%;max-height:92vh;overflow-y:auto;background:#fff;border-radius:22px;box-shadow:0 26px 80px rgba(15,23,42,.26)}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:24px 26px 14px;border-bottom:1px solid #eef2f7}
.modal-header h3{margin:0;font-size:1.22rem;color:#111827}
.close-btn{border:none;background:none;color:#94a3b8;font-size:1.6rem;cursor:pointer}
.modal-body{padding:20px 26px 26px}
.form-group{margin-bottom:16px}
.form-group label{display:block;margin-bottom:6px;color:#374151;font-size:.85rem;font-weight:800}
.form-group input,.form-group select{width:100%;padding:11px 13px;border:1px solid #d1d5db;border-radius:12px;font-size:.93rem;box-sizing:border-box}
.form-group input:focus,.form-group select:focus{outline:none;border-color:#0ea5e9;box-shadow:0 0 0 4px rgba(14,165,233,.12)}
.modal-actions{display:flex;gap:12px;margin-top:20px}
.modal-actions .btn-primary{flex:1;justify-content:center}
.toast{display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:12px 20px;border-radius:12px;background:#0f172a;color:#fff;font-size:.92rem;z-index:2000}
.toast.show{display:block}
.empty-msg{text-align:center;padding:54px 20px;color:#94a3b8}
@media(max-width:760px){
  .oa-page{padding-inline:14px}
  .page-header{flex-direction:column}
  .header-actions{width:100%;display:grid;grid-template-columns:1fr;gap:10px}
  .header-actions .btn-primary,.header-actions .btn-secondary{width:100%;justify-content:center}
  .users-table{border:none;box-shadow:none;background:transparent}
  .users-table thead{display:none}
  .users-table tbody{display:grid;gap:12px}
  .users-table tr{display:block;background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:8px 14px;box-shadow:0 10px 24px rgba(15,23,42,.04)}
  .users-table td{display:flex;justify-content:space-between;gap:12px;padding:8px 0;border-bottom:none;text-align:right}
  .users-table td:before{content:attr(data-label);font-size:.74rem;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:.04em;text-align:left}
  .users-table td[data-label="操作"]{display:block;padding-top:12px}
  .users-table td[data-label="操作"]:before{display:block;margin-bottom:8px}
  .action-stack{gap:8px}
  .action-stack .action-btn{flex:1;min-width:96px}
  .modal-overlay{padding:12px}
  .modal-header,.modal-body{padding-left:16px;padding-right:16px}
  .modal-actions{flex-direction:column}
  .modal-actions .btn-primary{width:100%;justify-content:center}
}
</style>
{% endblock %}
{% block content %}
<div class="oa-page">
  <a href="/oa/" class="back-link"><span class="material-icons" style="font-size:18px;">arrow_back</span> 返回 OA</a>
  <div class="page-header">
    <h1><span class="material-icons">people</span> 用户管理</h1>
    <div class="header-actions">
      <button class="btn-secondary" onclick="seedStaff()"><span class="material-icons" style="font-size:1.1rem;">group_add</span> 初始化员工账号</button>
      <button class="btn-primary" onclick="openUserModal()"><span class="material-icons" style="font-size:1.1rem;">add</span> 新建用户</button>
    </div>
  </div>
  <div class="users-table-wrap">
    <table class="users-table">
      <thead>
        <tr><th>姓名</th><th>用户名</th><th>角色</th><th>老师模式</th><th>手机号</th><th>状态</th><th>操作</th></tr>
      </thead>
      <tbody id="usersBody">
        <tr><td colspan="7" class="empty-msg">加载中...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div id="userModal" class="modal-overlay">
  <div class="modal-content">
    <div class="modal-header"><h3 id="userModalTitle">新建用户</h3><button class="close-btn" onclick="closeUserModal()">&times;</button></div>
    <div class="modal-body">
      <form id="userForm" onsubmit="saveUser(event)">
        <input type="hidden" id="userId" value="">
        <div class="form-group"><label>用户名</label><input type="text" id="formUsername" required placeholder="登录用户名"></div>
        <div class="form-group"><label>姓名</label><input type="text" id="formDisplayName" required placeholder="显示名称"></div>
        <div class="form-group"><label>密码 <span style="color:#94a3b8;font-weight:400;font-size:.78rem">(编辑时留空则不修改)</span></label><input type="password" id="formPassword" placeholder="设置密码"></div>
        <div class="form-group"><label>角色</label><select id="formRole"><option value="admin">管理员</option><option value="teacher">教师</option><option value="student" selected>学生</option></select></div>
        <div class="form-group"><label>老师工作模式</label><select id="formTeacherWorkMode"><option value="part_time" selected>兼职老师</option><option value="full_time">全职老师</option></select></div>
        <div class="form-group"><label>手机号</label><input type="text" id="formPhone" placeholder="选填"></div>
        <div class="modal-actions">
          <button type="submit" class="btn-primary"><span class="material-icons" style="font-size:1rem;">save</span> 保存</button>
        </div>
      </form>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>
{% endblock %}
{% block extra_js %}
<script>
const ROLE_META = {admin:{label:'管理员',cls:'role-admin'},teacher:{label:'教师',cls:'role-teacher'},student:{label:'学生',cls:'role-student'}};
const TEACHER_MODE_META = {part_time:'兼职老师',full_time:'全职老师'};
let allUsers = [];

function escapeHtml(v){if(!v)return'';const d=document.createElement('div');d.textContent=v;return d.innerHTML;}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

function renderUsers(){
  const tbody=document.getElementById('usersBody');
  if(!allUsers.length){tbody.innerHTML='<tr><td colspan="7" class="empty-msg">暂无用户</td></tr>';return;}
  tbody.innerHTML=allUsers.map(u=>{
    const r=ROLE_META[u.role]||ROLE_META.student;
    const isActive=u.is_active!==false;
    const teacherModeLabel = u.role === 'teacher' ? (TEACHER_MODE_META[u.teacher_work_mode] || '兼职老师') : '-';
    return `<tr>
      <td data-label="姓名">${escapeHtml(u.display_name)}</td>
      <td data-label="用户名">${escapeHtml(u.username)}</td>
      <td data-label="角色"><span class="role-badge ${r.cls}">${r.label}</span></td>
      <td data-label="老师模式">${escapeHtml(teacherModeLabel)}</td>
      <td data-label="手机号">${escapeHtml(u.phone||'-')}</td>
      <td data-label="状态"><span class="${isActive?'status-active':'status-inactive'}">${isActive?'启用':'停用'}</span></td>
      <td data-label="操作">
        <div class="action-stack">
          <button class="action-btn edit-btn" onclick="openEditUser(${u.id})">编辑</button>
          <button class="action-btn toggle-btn ${isActive?'deactivate':''}" onclick="toggleUser(${u.id})">${isActive?'停用':'启用'}</button>
          ${u.role === 'student' ? `<button class="action-btn" style="background:#fee2e2;color:#991b1b" onclick="deleteUser(${u.id}, '${escapeHtml(u.display_name)}')">删除</button>` : ''}
        </div>
      </td>
    </tr>`;
  }).join('');
}

async function loadUsers(){
  try{
    const res=await fetch('/auth/api/users');
    const json=await res.json();
    if(json.success){allUsers=json.data;renderUsers();}
    else showToast(json.error||'加载失败');
  }catch(e){showToast('加载用户失败');}
}

function openUserModal(){
  document.getElementById('userModalTitle').textContent='新建用户';
  document.getElementById('userId').value='';
  document.getElementById('userForm').reset();
  document.getElementById('formRole').value='student';
  document.getElementById('formTeacherWorkMode').value='part_time';
  document.getElementById('formUsername').removeAttribute('readonly');
  document.getElementById('userModal').classList.add('active');
}

function openEditUser(id){
  const u=allUsers.find(x=>x.id===id);
  if(!u)return;
  document.getElementById('userModalTitle').textContent='编辑用户';
  document.getElementById('userId').value=u.id;
  document.getElementById('formUsername').value=u.username;
  document.getElementById('formUsername').setAttribute('readonly','readonly');
  document.getElementById('formDisplayName').value=u.display_name||'';
  document.getElementById('formPassword').value='';
  document.getElementById('formRole').value=u.role||'student';
  document.getElementById('formTeacherWorkMode').value=u.teacher_work_mode||'part_time';
  document.getElementById('formPhone').value=u.phone||'';
  document.getElementById('userModal').classList.add('active');
}

function closeUserModal(){document.getElementById('userModal').classList.remove('active');}

async function saveUser(e){
  e.preventDefault();
  const id=document.getElementById('userId').value;
  const data={
    username:document.getElementById('formUsername').value.trim(),
    display_name:document.getElementById('formDisplayName').value.trim(),
    role:document.getElementById('formRole').value,
    teacher_work_mode:document.getElementById('formTeacherWorkMode').value,
    phone:document.getElementById('formPhone').value.trim()
  };
  const pw=document.getElementById('formPassword').value;
  if(pw)data.password=pw;
  else if(!id){showToast('新建用户请设置密码');return;}

  try{
    const url=id?`/auth/api/users/${id}`:'/auth/api/users';
    const method=id?'PUT':'POST';
    const res=await fetch(url,{method,headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    const json=await res.json();
    if(json.success){closeUserModal();showToast(id?'已更新':'已创建');loadUsers();}
    else showToast(json.error||'操作失败');
  }catch(e){showToast('操作失败');}
}

async function toggleUser(id){
  try{
    const res=await fetch(`/auth/api/users/${id}/toggle`,{method:'POST'});
    const json=await res.json();
    if(json.success){showToast('已更新状态');loadUsers();}
    else showToast(json.error||'操作失败');
  }catch(e){showToast('操作失败');}
}

async function deleteUser(id, displayName){
  if(!confirm(`确认删除学生账号「${displayName}」？该操作不可恢复。`)) return;
  try{
    const res=await fetch(`/auth/api/users/${id}`,{method:'DELETE'});
    const json=await res.json();
    if(json.success){showToast('已删除');loadUsers();}
    else showToast(json.error||'删除失败');
  }catch(e){showToast('删除失败');}
}

async function seedStaff(){
  if(!confirm('确认初始化员工账号？已存在的账号不会被覆盖。'))return;
  try{
    const res=await fetch('/auth/api/seed-staff',{method:'POST'});
    const json=await res.json();
    if(json.success){showToast('初始化完成');loadUsers();}
    else showToast(json.error||'初始化失败');
  }catch(e){showToast('初始化失败');}
}

document.addEventListener('DOMContentLoaded',loadUsers);
</script>
{% endblock %}
