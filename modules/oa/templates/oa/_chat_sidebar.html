<!-- AI Chat Sidebar — shared component for all OA pages -->
<style>
    .chat-toggle-btn {
        position: fixed; bottom: 24px; right: 24px;
        width: 56px; height: 56px; border-radius: 50%;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        color: white; border: none;
        box-shadow: 0 4px 14px rgba(37,99,235,0.4);
        cursor: pointer; z-index: 100;
        display: flex; align-items: center; justify-content: center;
        transition: transform 0.2s, box-shadow 0.2s;
    }
    .chat-toggle-btn:hover { transform: scale(1.08); box-shadow: 0 6px 20px rgba(37,99,235,0.5); }

    .chat-panel {
        position: fixed; bottom: 24px; right: 24px;
        width: 520px; height: 700px; max-height: 88vh;
        background: white; border-radius: 16px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.18);
        display: none; flex-direction: column;
        z-index: 101; overflow: hidden;
    }
    .chat-panel.active { display: flex; }

    .chat-panel-header {
        display: flex; align-items: center; gap: 8px;
        padding: 16px 20px;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        color: white; font-weight: 600; font-size: 1rem;
    }
    .chat-panel-header .close-chat {
        margin-left: auto; background: none; border: none;
        color: rgba(255,255,255,0.8); font-size: 1.4rem; cursor: pointer;
        line-height: 1;
    }
    .chat-panel-header .close-chat:hover { color: white; }

    .chat-messages {
        flex: 1; overflow-y: auto; padding: 18px;
        display: flex; flex-direction: column; gap: 12px;
        background: #f9fafb;
    }
    .chat-welcome {
        text-align: center; padding: 24px 12px;
        font-size: 0.9rem; color: #6b7280;
    }
    .chat-welcome .welcome-title {
        font-size: 1rem; font-weight: 600; color: #374151; margin-bottom: 6px;
    }
    .chat-welcome .welcome-sub { margin-bottom: 16px; }
    .chat-welcome .tpl-group-label {
        font-size: 0.78rem; color: #9ca3af; text-align: left; margin: 12px 0 6px 4px;
        font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .chat-welcome ul {
        list-style: none; padding: 0; margin: 0 0 4px;
        display: flex; flex-direction: column; gap: 6px;
    }
    .chat-welcome li {
        background: white; border: 1px solid #e5e7eb; border-radius: 10px;
        padding: 10px 14px; font-size: 0.88rem; cursor: pointer;
        transition: border-color 0.15s, background 0.15s;
        text-align: left; display: flex; align-items: center; gap: 8px;
    }
    .chat-welcome li:hover { border-color: #2563eb; background: #eff6ff; }
    .chat-welcome li .tpl-icon { font-size: 1.1rem; color: #6366f1; }
    .chat-welcome li .tpl-label { font-weight: 500; color: #374151; }
    .chat-welcome li .tpl-hint { font-size: 0.78rem; color: #9ca3af; margin-top: 1px; }

    .chat-msg {
        max-width: 88%; padding: 12px 16px; border-radius: 14px;
        font-size: 0.9rem; line-height: 1.6; word-break: break-word;
    }
    .chat-msg.user {
        align-self: flex-end; background: #2563eb; color: white;
        border-bottom-right-radius: 4px;
    }
    .chat-msg.assistant {
        align-self: flex-start; background: white; color: #1f2937;
        border: 1px solid #e5e7eb; border-bottom-left-radius: 4px;
    }
    .chat-msg.assistant pre {
        background: #f3f4f6; padding: 8px; border-radius: 6px;
        overflow-x: auto; font-size: 0.82rem; margin: 6px 0 0;
    }
    .chat-msg.system-msg {
        align-self: center; background: #fef3c7; color: #92400e;
        font-size: 0.82rem; padding: 6px 14px; border-radius: 20px;
    }
    .chat-msg.thinking-msg {
        align-self: center; color: #9ca3af; font-size: 0.82rem;
        padding: 4px 10px; font-style: italic;
    }

    .chat-proposal-card {
        background: #f0fdf4; border: 1px solid #86efac; border-radius: 10px;
        padding: 14px; margin: 8px 0;
    }
    .chat-proposal-card .proposal-summary {
        font-size: 0.9rem; font-weight: 500; color: #166534; margin-bottom: 8px;
    }
    .chat-proposal-card .proposal-detail {
        font-size: 0.82rem; color: #374151; max-height: 200px;
        overflow-y: auto; margin-bottom: 10px;
    }
    .chat-proposal-card .proposal-detail table {
        width: 100%; border-collapse: collapse; font-size: 0.8rem;
    }
    .chat-proposal-card .proposal-detail th,
    .chat-proposal-card .proposal-detail td {
        padding: 5px 8px; border-bottom: 1px solid #d1fae5; text-align: left;
    }
    .chat-proposal-card .proposal-detail th { font-weight: 600; color: #166534; }
    .chat-proposal-actions { display: flex; gap: 8px; }
    .chat-proposal-actions button {
        flex: 1; padding: 10px; border: none; border-radius: 8px;
        font-size: 0.9rem; font-weight: 500; cursor: pointer;
        transition: opacity 0.15s;
    }
    .chat-proposal-actions button:hover { opacity: 0.85; }
    .chat-proposal-actions .confirm-btn { background: #22c55e; color: white; }
    .chat-proposal-actions .reject-btn { background: #fee2e2; color: #dc2626; }

    .chat-input-area {
        display: flex; gap: 10px; padding: 14px 18px;
        border-top: 1px solid #e5e7eb; background: white;
    }
    .chat-input-area textarea {
        flex: 1; border: 1px solid #d1d5db; border-radius: 12px;
        padding: 10px 14px; font-size: 0.92rem; resize: none;
        min-height: 44px; max-height: 200px; font-family: inherit;
        line-height: 1.4; overflow-y: auto;
    }
    .chat-input-area textarea:focus { outline: none; border-color: #2563eb; }
    .chat-send-btn {
        background: #2563eb; color: white; border: none;
        border-radius: 12px; width: 46px; min-width: 46px;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; transition: background 0.15s;
    }
    .chat-send-btn:hover { background: #1d4ed8; }
    .chat-send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    @media (max-width: 640px) {
        .chat-panel { width: calc(100vw - 16px); right: 8px; bottom: 8px; height: 80vh; }
    }
</style>

<button id="chatToggle" class="chat-toggle-btn" onclick="toggleChat()" title="AI 智能助手">
    <span class="material-icons" style="font-size:1.6rem;">smart_toy</span>
</button>

<div id="chatPanel" class="chat-panel">
    <div class="chat-panel-header">
        <span class="material-icons" style="font-size:1.3rem;">smart_toy</span>
        <span>AI 智能助手</span>
        <button class="close-chat" onclick="toggleChat()">&times;</button>
    </div>
    <div class="chat-messages" id="chatMessages">
        <div class="chat-welcome" id="chatWelcome">
            <p class="welcome-title">你好，我是 AI 智能助手</p>
            <p class="welcome-sub">我可以帮你管理课程和待办，选择模板或直接输入：</p>
            <div class="tpl-group-label">快捷模板</div>
            <ul>
                <li onclick="quickTemplate('给___排课，学生___，每周_晚_点到_点，排_节')">
                    <span class="material-icons tpl-icon">calendar_month</span>
                    <div><div class="tpl-label">排课</div><div class="tpl-hint">填写教师、学生、时间等信息</div></div>
                </li>
                <li onclick="quickTemplate('创建待办：___，截止日期___，负责人___')">
                    <span class="material-icons tpl-icon">add_task</span>
                    <div><div class="tpl-label">创建待办</div><div class="tpl-hint">填写待办内容、截止日期、负责人</div></div>
                </li>
            </ul>
            <div class="tpl-group-label">快捷查询</div>
            <ul>
                <li onclick="quickSend('查看本周的课程安排')">
                    <span class="material-icons tpl-icon">search</span>
                    <div><div class="tpl-label">查看本周课程</div></div>
                </li>
                <li onclick="quickSend('列出所有待办事项')">
                    <span class="material-icons tpl-icon">checklist</span>
                    <div><div class="tpl-label">查看所有待办</div></div>
                </li>
            </ul>
        </div>
    </div>
    <div class="chat-input-area">
        <textarea id="chatInput" rows="1" placeholder="输入指令，或选择上方模板…"
                  oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,200)+'px'"
                  onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChatMessage()}"></textarea>
        <button id="chatSendBtn" class="chat-send-btn" onclick="sendChatMessage()">
            <span class="material-icons" style="font-size:1.3rem;">send</span>
        </button>
    </div>
</div>
