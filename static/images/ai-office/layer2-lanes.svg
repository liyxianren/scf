<svg viewBox="0 0 960 460" xmlns="http://www.w3.org/2000/svg" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif">
  <defs>
    <marker id="arrLn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6366f1"/>
    </marker>
  </defs>
  <rect width="960" height="460" fill="#f8fafc"/>
  <text x="480" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Layer 2 · 车道队列：会话隔离 + FIFO 串行执行</text>
  <text x="480" y="56" text-anchor="middle" font-size="12" fill="#64748b">每个会话一条专属车道，车道内事件严格按到达顺序处理 → 消除跨会话污染与并发竞态</text>

  <!-- Left: incoming events -->
  <g>
    <text x="60" y="110" font-size="12" font-weight="600" fill="#1e293b">渠道输入</text>
    <g>
      <rect x="30" y="130" width="120" height="36" rx="6" fill="white" stroke="#94a3b8"/>
      <text x="90" y="153" text-anchor="middle" font-size="11" fill="#1e293b">用户 A: 问天气</text>
    </g>
    <g>
      <rect x="30" y="176" width="120" height="36" rx="6" fill="white" stroke="#94a3b8"/>
      <text x="90" y="199" text-anchor="middle" font-size="11" fill="#1e293b">用户 B: 跑报表</text>
    </g>
    <g>
      <rect x="30" y="222" width="120" height="36" rx="6" fill="white" stroke="#94a3b8"/>
      <text x="90" y="245" text-anchor="middle" font-size="11" fill="#1e293b">用户 A: 发邮件</text>
    </g>
    <g>
      <rect x="30" y="268" width="120" height="36" rx="6" fill="white" stroke="#94a3b8"/>
      <text x="90" y="291" text-anchor="middle" font-size="11" fill="#1e293b">用户 C: 查日历</text>
    </g>
    <g>
      <rect x="30" y="314" width="120" height="36" rx="6" fill="white" stroke="#94a3b8"/>
      <text x="90" y="337" text-anchor="middle" font-size="11" fill="#1e293b">用户 A: 写总结</text>
    </g>
  </g>

  <!-- Router -->
  <g>
    <rect x="200" y="200" width="120" height="80" rx="10" fill="#6366f1"/>
    <text x="260" y="230" text-anchor="middle" font-size="13" font-weight="700" fill="white">会话路由器</text>
    <text x="260" y="252" text-anchor="middle" font-size="11" fill="white" opacity="0.9">按 user_id / task</text>
    <text x="260" y="268" text-anchor="middle" font-size="11" fill="white" opacity="0.9">分派到对应车道</text>
  </g>
  <line x1="155" y1="148" x2="200" y2="220" stroke="#6366f1" stroke-width="1.3" marker-end="url(#arrLn)"/>
  <line x1="155" y1="194" x2="200" y2="230" stroke="#6366f1" stroke-width="1.3" marker-end="url(#arrLn)"/>
  <line x1="155" y1="240" x2="200" y2="240" stroke="#6366f1" stroke-width="1.3" marker-end="url(#arrLn)"/>
  <line x1="155" y1="286" x2="200" y2="250" stroke="#6366f1" stroke-width="1.3" marker-end="url(#arrLn)"/>
  <line x1="155" y1="332" x2="200" y2="260" stroke="#6366f1" stroke-width="1.3" marker-end="url(#arrLn)"/>

  <!-- Lanes -->
  <g>
    <!-- Lane A -->
    <text x="360" y="116" font-size="12" font-weight="600" fill="#2563eb">车道 · 用户 A</text>
    <rect x="360" y="125" width="540" height="54" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-dasharray="4,3"/>
    <g>
      <rect x="372" y="135" width="120" height="34" rx="5" fill="#2563eb"/>
      <text x="432" y="156" text-anchor="middle" font-size="11" fill="white">① 问天气</text>
    </g>
    <g>
      <rect x="502" y="135" width="120" height="34" rx="5" fill="#60a5fa"/>
      <text x="562" y="156" text-anchor="middle" font-size="11" fill="white">② 发邮件</text>
    </g>
    <g>
      <rect x="632" y="135" width="120" height="34" rx="5" fill="#93c5fd"/>
      <text x="692" y="156" text-anchor="middle" font-size="11" fill="white">③ 写总结</text>
    </g>
    <text x="880" y="156" text-anchor="end" font-size="11" fill="#64748b">FIFO →</text>

    <!-- Lane B -->
    <text x="360" y="206" font-size="12" font-weight="600" fill="#6366f1">车道 · 用户 B</text>
    <rect x="360" y="215" width="540" height="54" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-dasharray="4,3"/>
    <g>
      <rect x="372" y="225" width="120" height="34" rx="5" fill="#6366f1"/>
      <text x="432" y="246" text-anchor="middle" font-size="11" fill="white">① 跑报表</text>
    </g>
    <text x="880" y="246" text-anchor="end" font-size="11" fill="#64748b">FIFO →</text>

    <!-- Lane C -->
    <text x="360" y="296" font-size="12" font-weight="600" fill="#0ea5e9">车道 · 用户 C</text>
    <rect x="360" y="305" width="540" height="54" rx="8" fill="#ecfeff" stroke="#0ea5e9" stroke-dasharray="4,3"/>
    <g>
      <rect x="372" y="315" width="120" height="34" rx="5" fill="#0ea5e9"/>
      <text x="432" y="336" text-anchor="middle" font-size="11" fill="white">① 查日历</text>
    </g>
    <text x="880" y="336" text-anchor="end" font-size="11" fill="#64748b">FIFO →</text>
  </g>

  <!-- Key point -->
  <g>
    <rect x="80" y="390" width="800" height="50" rx="8" fill="white" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="100" y="414" font-size="12" font-weight="700" fill="#b45309">关键：</text>
    <text x="148" y="414" font-size="12" fill="#1e293b">车道内严格串行 → 没有共享状态被同时改写；车道之间并行 → 多用户互不阻塞</text>
    <text x="148" y="432" font-size="11" fill="#64748b">工程效果：消除竞态条件、状态污染、上下文串扰；任务执行可预测、可复现</text>
  </g>
</svg>
