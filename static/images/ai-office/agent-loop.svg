<svg viewBox="0 0 960 480" xmlns="http://www.w3.org/2000/svg" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif">
  <defs>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
    <marker id="arr2g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#10b981"/>
    </marker>
  </defs>
  <rect width="960" height="480" fill="#f8fafc"/>
  <text x="480" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Agent = LLM + Tools + Loop</text>
  <text x="480" y="58" text-anchor="middle" font-size="12" fill="#64748b">LLM 每轮决定下一步要调用哪个工具；工具返回的观察又进入下一轮推理</text>

  <!-- Input task (left) -->
  <g>
    <rect x="30" y="200" width="130" height="80" rx="10" fill="white" stroke="#2563eb" stroke-width="2"/>
    <text x="95" y="230" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">任务 Prompt</text>
    <text x="95" y="252" text-anchor="middle" font-size="11" fill="#64748b">"帮我查北京天气</text>
    <text x="95" y="266" text-anchor="middle" font-size="11" fill="#64748b">并发邮件给老板"</text>
  </g>
  <line x1="165" y1="240" x2="200" y2="240" stroke="#2563eb" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- Center: circular loop -->
  <!-- Ring background -->
  <circle cx="480" cy="240" r="170" fill="none" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Central LLM -->
  <circle cx="480" cy="240" r="72" fill="#2563eb"/>
  <text x="480" y="232" text-anchor="middle" font-size="14" font-weight="700" fill="white">LLM</text>
  <text x="480" y="252" text-anchor="middle" font-size="11" fill="white" opacity="0.9">推理 / 决策</text>
  <text x="480" y="268" text-anchor="middle" font-size="10" fill="white" opacity="0.8">下一步做什么？</text>

  <!-- Step 1 node: Tool Selection -->
  <g>
    <circle cx="700" cy="170" r="44" fill="white" stroke="#6366f1" stroke-width="2"/>
    <text x="700" y="166" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">① 工具选择</text>
    <text x="700" y="184" text-anchor="middle" font-size="10" fill="#64748b">search_weather</text>
  </g>
  <!-- Step 2 node: Tool Execute -->
  <g>
    <circle cx="700" cy="320" r="44" fill="white" stroke="#0ea5e9" stroke-width="2"/>
    <text x="700" y="316" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">② 工具执行</text>
    <text x="700" y="334" text-anchor="middle" font-size="10" fill="#64748b">HTTP / shell / API</text>
  </g>
  <!-- Step 3 node: Observation -->
  <g>
    <circle cx="260" cy="320" r="44" fill="white" stroke="#f59e0b" stroke-width="2"/>
    <text x="260" y="316" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">③ 观察结果</text>
    <text x="260" y="334" text-anchor="middle" font-size="10" fill="#64748b">"晴, 25°C"</text>
  </g>
  <!-- Step 4 node: Next Decision -->
  <g>
    <circle cx="260" cy="170" r="44" fill="white" stroke="#ef4444" stroke-width="2"/>
    <text x="260" y="166" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">④ 继续 / 完成?</text>
    <text x="260" y="184" text-anchor="middle" font-size="10" fill="#64748b">还要发邮件 → 继续</text>
  </g>

  <!-- Loop arrows (clockwise) -->
  <path d="M 548 200 Q 620 160 656 168" fill="none" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arr2)"/>
  <path d="M 700 214 Q 700 260 700 276" fill="none" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arr2)"/>
  <path d="M 656 330 Q 480 380 304 330" fill="none" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arr2)"/>
  <path d="M 260 276 Q 260 230 260 214" fill="none" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arr2)"/>
  <path d="M 304 170 Q 360 200 412 220" fill="none" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arr2)"/>

  <!-- Output -->
  <line x1="552" y1="240" x2="760" y2="240" stroke="#10b981" stroke-width="0" />
  <g>
    <rect x="800" y="200" width="130" height="80" rx="10" fill="#10b981" stroke="#10b981" stroke-width="2"/>
    <text x="865" y="230" text-anchor="middle" font-size="13" font-weight="600" fill="white">任务完成</text>
    <text x="865" y="252" text-anchor="middle" font-size="11" fill="white" opacity="0.9">"邮件已发出"</text>
    <text x="865" y="266" text-anchor="middle" font-size="10" fill="white" opacity="0.8">final answer</text>
  </g>
  <path d="M 260 126 Q 480 60 800 220" fill="none" stroke="#10b981" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#arr2g)"/>
  <text x="540" y="82" text-anchor="middle" font-size="11" fill="#10b981" font-weight="600">④ 判定任务完成 → 退出循环</text>

  <!-- Footer note -->
  <text x="480" y="450" text-anchor="middle" font-size="12" fill="#64748b">停止条件：任务完成 · 达到最大步数 · 工具调用连续失败 · 用户中断</text>
</svg>
