<svg viewBox="0 0 960 480" xmlns="http://www.w3.org/2000/svg" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif">
  <defs>
    <marker id="arrOW" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="960" height="480" fill="#f8fafc"/>
  <text x="480" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">办公实战闭环：需求 → Prompt → Agent → 工具 → 产物</text>
  <text x="480" y="58" text-anchor="middle" font-size="12" fill="#64748b">你只管描述"想要什么"，Agent 负责规划并调用具体工具生成 pptx / docx / xlsx</text>

  <!-- 1. Need -->
  <g>
    <rect x="30" y="150" width="150" height="100" rx="10" fill="white" stroke="#2563eb" stroke-width="2"/>
    <text x="105" y="182" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">① 用户需求</text>
    <text x="105" y="206" text-anchor="middle" font-size="11" fill="#64748b">"我要一份 Q1</text>
    <text x="105" y="222" text-anchor="middle" font-size="11" fill="#64748b">销售复盘 PPT"</text>
    <text x="105" y="240" text-anchor="middle" font-size="10" fill="#94a3b8">人话描述</text>
  </g>
  <line x1="185" y1="200" x2="215" y2="200" stroke="#2563eb" stroke-width="1.6" marker-end="url(#arrOW)"/>

  <!-- 2. Prompt -->
  <g>
    <rect x="220" y="130" width="160" height="140" rx="10" fill="white" stroke="#6366f1" stroke-width="2"/>
    <text x="300" y="160" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">② Prompt 构造</text>
    <g font-size="10" fill="#475569">
      <text x="240" y="184">角色：资深顾问</text>
      <text x="240" y="200">任务：8 页 PPT</text>
      <text x="240" y="216">约束：每页 ≤5 条</text>
      <text x="240" y="232">素材：销售数据</text>
      <text x="240" y="248">产出：.pptx</text>
    </g>
    <text x="300" y="264" text-anchor="middle" font-size="10" fill="#94a3b8">5 构件</text>
  </g>
  <line x1="385" y1="200" x2="415" y2="200" stroke="#2563eb" stroke-width="1.6" marker-end="url(#arrOW)"/>

  <!-- 3. Agent Planning -->
  <g>
    <rect x="420" y="130" width="160" height="140" rx="10" fill="white" stroke="#0ea5e9" stroke-width="2"/>
    <text x="500" y="160" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">③ Agent 规划</text>
    <g font-size="10" fill="#475569">
      <text x="440" y="184">· 识别 pptx skill</text>
      <text x="440" y="200">· 读销售数据文件</text>
      <text x="440" y="216">· 生成大纲 8 页</text>
      <text x="440" y="232">· 填充每页内容</text>
      <text x="440" y="248">· 自检约束</text>
    </g>
    <text x="500" y="264" text-anchor="middle" font-size="10" fill="#94a3b8">多步推理</text>
  </g>
  <line x1="585" y1="200" x2="615" y2="200" stroke="#2563eb" stroke-width="1.6" marker-end="url(#arrOW)"/>

  <!-- 4. Tool exec -->
  <g>
    <rect x="620" y="130" width="160" height="140" rx="10" fill="white" stroke="#10b981" stroke-width="2"/>
    <text x="700" y="160" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">④ 工具执行</text>
    <g font-size="10" fill="#475569">
      <text x="640" y="184">· python-pptx 写盘</text>
      <text x="640" y="200">· openpyxl 读数据</text>
      <text x="640" y="216">· matplotlib 画图</text>
      <text x="640" y="232">· 文件系统输出</text>
    </g>
    <text x="700" y="264" text-anchor="middle" font-size="10" fill="#94a3b8">沙箱运行</text>
  </g>
  <line x1="785" y1="200" x2="815" y2="200" stroke="#2563eb" stroke-width="1.6" marker-end="url(#arrOW)"/>

  <!-- 5. Output artifacts -->
  <g>
    <rect x="820" y="100" width="120" height="200" rx="10" fill="#10b981"/>
    <text x="880" y="126" text-anchor="middle" font-size="13" font-weight="700" fill="white">⑤ 产物</text>

    <rect x="835" y="140" width="90" height="30" rx="5" fill="white"/>
    <text x="880" y="160" text-anchor="middle" font-size="11" font-weight="600" fill="#b45309">output.pptx</text>

    <rect x="835" y="178" width="90" height="30" rx="5" fill="white"/>
    <text x="880" y="198" text-anchor="middle" font-size="11" font-weight="600" fill="#2563eb">output.docx</text>

    <rect x="835" y="216" width="90" height="30" rx="5" fill="white"/>
    <text x="880" y="236" text-anchor="middle" font-size="11" font-weight="600" fill="#047857">output.xlsx</text>

    <rect x="835" y="254" width="90" height="30" rx="5" fill="white"/>
    <text x="880" y="274" text-anchor="middle" font-size="11" font-weight="600" fill="#ef4444">output.pdf</text>
  </g>

  <!-- Feedback loop -->
  <path d="M 880 310 Q 880 380 480 380 Q 80 380 105 260" fill="none" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="5,4" marker-end="url(#arrOW)"/>
  <text x="480" y="404" text-anchor="middle" font-size="11" fill="#64748b">不满意？调整 Prompt / 指出具体问题，回到 ② 再跑一轮</text>

  <!-- Bottom legend -->
  <rect x="30" y="430" width="910" height="36" rx="6" fill="white" stroke="#cbd5e1"/>
  <text x="485" y="453" text-anchor="middle" font-size="11" fill="#1e293b">关键：用户只在①②⑤出现，③④由 Agent 自动完成 —— 职责边界清晰，出错好定位</text>
</svg>
