<svg viewBox="0 0 960 480" xmlns="http://www.w3.org/2000/svg" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif">
  <rect width="960" height="480" fill="#f8fafc"/>
  <text x="480" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">纯 LLM 与 Agent 能力对比</text>
  <text x="480" y="60" text-anchor="middle" font-size="12" fill="#64748b">同一个模型，外面套不套"工具 + 循环"，能做的事差距巨大</text>

  <!-- Left: LLM -->
  <g>
    <rect x="60" y="100" width="400" height="330" rx="14" fill="white" stroke="#94a3b8" stroke-width="2"/>
    <rect x="60" y="100" width="400" height="50" rx="14" fill="#64748b"/>
    <rect x="60" y="130" width="400" height="20" fill="#64748b"/>
    <text x="260" y="132" text-anchor="middle" font-size="16" font-weight="700" fill="white">纯 LLM</text>
    <text x="260" y="146" text-anchor="middle" font-size="11" fill="white" opacity="0.8">（只会接话的天才）</text>

    <g font-size="13" fill="#1e293b">
      <g>
        <circle cx="88" cy="184" r="9" fill="#10b981"/>
        <text x="86" y="189" text-anchor="middle" font-size="12" font-weight="700" fill="white">✓</text>
        <text x="108" y="189">回答单轮问题</text>
        <text x="320" y="189" fill="#64748b" font-size="11">"Python 怎么读文件？"</text>
      </g>
      <g>
        <circle cx="88" cy="224" r="9" fill="#10b981"/>
        <text x="86" y="229" text-anchor="middle" font-size="12" font-weight="700" fill="white">✓</text>
        <text x="108" y="229">根据训练数据生成文本</text>
      </g>
      <g>
        <circle cx="88" cy="264" r="9" fill="#ef4444"/>
        <text x="86" y="269" text-anchor="middle" font-size="12" font-weight="700" fill="white">✗</text>
        <text x="108" y="269">不能主动去查实时信息</text>
        <text x="320" y="269" fill="#64748b" font-size="11">不知道今天股价</text>
      </g>
      <g>
        <circle cx="88" cy="304" r="9" fill="#ef4444"/>
        <text x="86" y="309" text-anchor="middle" font-size="12" font-weight="700" fill="white">✗</text>
        <text x="108" y="309">不能读本地文件 / 操作电脑</text>
      </g>
      <g>
        <circle cx="88" cy="344" r="9" fill="#ef4444"/>
        <text x="86" y="349" text-anchor="middle" font-size="12" font-weight="700" fill="white">✗</text>
        <text x="108" y="349">不能自主循环、试错、重规划</text>
      </g>
      <g>
        <circle cx="88" cy="384" r="9" fill="#ef4444"/>
        <text x="86" y="389" text-anchor="middle" font-size="12" font-weight="700" fill="white">✗</text>
        <text x="108" y="389">不能跨会话记住你的偏好</text>
      </g>
    </g>
  </g>

  <!-- Right: Agent -->
  <g>
    <rect x="500" y="100" width="400" height="330" rx="14" fill="white" stroke="#2563eb" stroke-width="2"/>
    <rect x="500" y="100" width="400" height="50" rx="14" fill="#2563eb"/>
    <rect x="500" y="130" width="400" height="20" fill="#2563eb"/>
    <text x="700" y="132" text-anchor="middle" font-size="16" font-weight="700" fill="white">Agent</text>
    <text x="700" y="146" text-anchor="middle" font-size="11" fill="white" opacity="0.9">（会动手的执行体）</text>

    <g font-size="13" fill="#1e293b">
      <g>
        <circle cx="528" cy="184" r="9" fill="#10b981"/>
        <text x="526" y="189" text-anchor="middle" font-size="12" font-weight="700" fill="white">✓</text>
        <text x="548" y="189">回答单轮问题</text>
      </g>
      <g>
        <circle cx="528" cy="224" r="9" fill="#10b981"/>
        <text x="526" y="229" text-anchor="middle" font-size="12" font-weight="700" fill="white">✓</text>
        <text x="548" y="229">调用工具查实时信息</text>
        <text x="760" y="229" fill="#64748b" font-size="11">web / DB / API</text>
      </g>
      <g>
        <circle cx="528" cy="264" r="9" fill="#10b981"/>
        <text x="526" y="269" text-anchor="middle" font-size="12" font-weight="700" fill="white">✓</text>
        <text x="548" y="269">读写本地文件 / 执行 shell</text>
        <text x="760" y="269" fill="#64748b" font-size="11">改代码、做文档</text>
      </g>
      <g>
        <circle cx="528" cy="304" r="9" fill="#10b981"/>
        <text x="526" y="309" text-anchor="middle" font-size="12" font-weight="700" fill="white">✓</text>
        <text x="548" y="309">多轮循环，失败后重规划</text>
      </g>
      <g>
        <circle cx="528" cy="344" r="9" fill="#10b981"/>
        <text x="526" y="349" text-anchor="middle" font-size="12" font-weight="700" fill="white">✓</text>
        <text x="548" y="349">长期记忆用户偏好与规则</text>
      </g>
      <g>
        <circle cx="528" cy="384" r="9" fill="#10b981"/>
        <text x="526" y="389" text-anchor="middle" font-size="12" font-weight="700" fill="white">✓</text>
        <text x="548" y="389">跨会话记住你的偏好</text>
        <text x="760" y="389" fill="#64748b" font-size="11">MEMORY.md</text>
      </g>
    </g>
  </g>

  <text x="480" y="460" text-anchor="middle" font-size="12" fill="#64748b">本质差异：Agent = LLM + 工具接入 + 多轮循环 + 状态/记忆</text>
</svg>
