<svg viewBox="0 0 960 500" xmlns="http://www.w3.org/2000/svg" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif">
  <defs>
    <marker id="arrSK" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6366f1"/>
    </marker>
    <marker id="arrSG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#10b981"/>
    </marker>
  </defs>
  <rect width="960" height="500" fill="#f8fafc"/>
  <text x="480" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Skills（技能）与 子 Agent（Sub-agent）</text>
  <text x="480" y="58" text-anchor="middle" font-size="12" fill="#64748b">两种对主 Agent 的"能力扩展"，职责不同：Skills 是知识包，子 Agent 是独立执行体</text>

  <!-- Center main agent -->
  <g>
    <circle cx="480" cy="270" r="80" fill="#2563eb"/>
    <text x="480" y="262" text-anchor="middle" font-size="14" font-weight="700" fill="white">主 Agent</text>
    <text x="480" y="282" text-anchor="middle" font-size="11" fill="white" opacity="0.9">承接对话</text>
    <text x="480" y="298" text-anchor="middle" font-size="11" fill="white" opacity="0.9">主上下文持有</text>
  </g>

  <!-- Left: Skills -->
  <g>
    <rect x="30" y="110" width="310" height="320" rx="14" fill="white" stroke="#6366f1" stroke-width="2"/>
    <rect x="30" y="110" width="310" height="40" rx="14" fill="#6366f1"/>
    <rect x="30" y="135" width="310" height="15" fill="#6366f1"/>
    <text x="185" y="137" text-anchor="middle" font-size="14" font-weight="700" fill="white">Skills · 技能包</text>

    <text x="50" y="178" font-size="12" font-weight="600" fill="#1e293b">怎么加载</text>
    <text x="50" y="196" font-size="11" fill="#475569">用户 prompt 里出现触发词 →</text>
    <text x="50" y="212" font-size="11" fill="#475569">对应 SKILL.md 自动并入系统提示</text>

    <text x="50" y="240" font-size="12" font-weight="600" fill="#1e293b">里面装什么</text>
    <text x="50" y="258" font-size="11" fill="#475569">· 领域步骤（如 pptx/docx/xlsx）</text>
    <text x="50" y="274" font-size="11" fill="#475569">· 约定的产出格式</text>
    <text x="50" y="290" font-size="11" fill="#475569">· 可用工具的调用约定</text>
    <text x="50" y="306" font-size="11" fill="#475569">· 反例与禁止项</text>

    <text x="50" y="334" font-size="12" font-weight="600" fill="#1e293b">举例</text>
    <g font-size="11">
      <rect x="50" y="344" width="120" height="22" rx="4" fill="#eef2ff" stroke="#6366f1"/>
      <text x="110" y="359" text-anchor="middle" fill="#4338ca">pptx</text>
      <rect x="180" y="344" width="120" height="22" rx="4" fill="#eef2ff" stroke="#6366f1"/>
      <text x="240" y="359" text-anchor="middle" fill="#4338ca">xlsx</text>
      <rect x="50" y="372" width="120" height="22" rx="4" fill="#eef2ff" stroke="#6366f1"/>
      <text x="110" y="387" text-anchor="middle" fill="#4338ca">docx</text>
      <rect x="180" y="372" width="120" height="22" rx="4" fill="#eef2ff" stroke="#6366f1"/>
      <text x="240" y="387" text-anchor="middle" fill="#4338ca">pdf</text>
    </g>
    <text x="50" y="418" font-size="10" fill="#94a3b8">类比：按需插拔的"说明书"</text>
  </g>
  <path d="M 340 270 Q 375 270 400 270" fill="none" stroke="#6366f1" stroke-width="1.8" marker-end="url(#arrSK)"/>
  <text x="368" y="260" text-anchor="middle" font-size="10" fill="#6366f1" font-weight="600">挂载到系统提示</text>

  <!-- Right: Sub-agents -->
  <g>
    <rect x="620" y="110" width="310" height="320" rx="14" fill="white" stroke="#10b981" stroke-width="2"/>
    <rect x="620" y="110" width="310" height="40" rx="14" fill="#10b981"/>
    <rect x="620" y="135" width="310" height="15" fill="#10b981"/>
    <text x="775" y="137" text-anchor="middle" font-size="14" font-weight="700" fill="white">Sub-agent · 子 Agent</text>

    <text x="640" y="178" font-size="12" font-weight="600" fill="#1e293b">怎么创建</text>
    <text x="640" y="196" font-size="11" fill="#475569">主 Agent 显式派发：</text>
    <text x="640" y="212" font-size="11" fill="#475569">"去搜全仓库 X 的实现，只回摘要"</text>

    <text x="640" y="240" font-size="12" font-weight="600" fill="#1e293b">关键特性</text>
    <text x="640" y="258" font-size="11" fill="#475569">· 独立上下文（主上下文不受污染）</text>
    <text x="640" y="274" font-size="11" fill="#475569">· 只把最终结论回传给主 Agent</text>
    <text x="640" y="290" font-size="11" fill="#475569">· 可以并行多个子 Agent</text>
    <text x="640" y="306" font-size="11" fill="#475569">· 可以指定不同模型/工具权限</text>

    <text x="640" y="334" font-size="12" font-weight="600" fill="#1e293b">举例</text>
    <g font-size="11">
      <rect x="640" y="344" width="130" height="22" rx="4" fill="#d1fae5" stroke="#10b981"/>
      <text x="705" y="359" text-anchor="middle" fill="#047857">Explore 子 Agent</text>
      <rect x="780" y="344" width="130" height="22" rx="4" fill="#d1fae5" stroke="#10b981"/>
      <text x="845" y="359" text-anchor="middle" fill="#047857">Plan 子 Agent</text>
      <rect x="640" y="372" width="130" height="22" rx="4" fill="#d1fae5" stroke="#10b981"/>
      <text x="705" y="387" text-anchor="middle" fill="#047857">Review 子 Agent</text>
      <rect x="780" y="372" width="130" height="22" rx="4" fill="#d1fae5" stroke="#10b981"/>
      <text x="845" y="387" text-anchor="middle" fill="#047857">自定义</text>
    </g>
    <text x="640" y="418" font-size="10" fill="#94a3b8">类比：派出的专项小组</text>
  </g>
  <path d="M 620 270 Q 585 270 560 270" fill="none" stroke="#10b981" stroke-width="1.8" marker-end="url(#arrSG)"/>
  <text x="590" y="260" text-anchor="middle" font-size="10" fill="#10b981" font-weight="600">派发任务 / 回传结论</text>

  <!-- Bottom note -->
  <rect x="40" y="450" width="880" height="36" rx="6" fill="white" stroke="#cbd5e1"/>
  <text x="480" y="473" text-anchor="middle" font-size="11" fill="#1e293b">差异：Skills 改变"主 Agent 怎么想"　·　子 Agent 改变"谁来做这件事"</text>
</svg>
